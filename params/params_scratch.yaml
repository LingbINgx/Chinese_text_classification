train_file_path: "data/cnews.train.csv"
val_file_path: "data/cnews.val.csv"
test_file_path: "data/cnews.test.csv"
max_length: 256
train_batch_size: 32
eval_batch_size: 32
learning_rate: 3.0e-4
epochs: 5
output_dir: "checkpoints/scratch_transformer_cnews"

weight_decay: 0.01

warmup_ratio: 0.1

min_freq: 2
max_vocab_size: 12000

embed_dim: 256
num_heads: 8
num_layers: 12
ffn_dim: 1024
dropout: 0.1
