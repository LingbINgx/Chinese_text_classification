train_file_path: "data/cnews.train.csv"
val_file_path: "data/cnews.val.csv"
test_file_path: "data/cnews.test.csv"
max_length: 256
train_batch_size: 64
eval_batch_size: 128
learning_rate: 1.0e-3
epochs: 8
output_dir: "checkpoints/textcnn"

weight_decay: 0.01

min_freq: 2
max_vocab_size: 12000

embed_dim: 256
num_filters: 128
kernel_sizes: [3, 4, 5]
dropout: 0.5

warmup_ratio: 0.1
