train_file_path: "data/cnews.train.csv"
val_file_path: "data/cnews.val.csv"
test_file_path: "data/cnews.test.csv"
max_length: 256
train_batch_size: 16
eval_batch_size: 32
learning_rate: 2.0e-5
epochs: 3
output_dir: "checkpoints/transformer_cnews"

model_name: "bert-base-chinese"
weight_decay: 0.01
warmup_ratio: 0.1
dropout_prob: 0.1
freeze_encoder: false
